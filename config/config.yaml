sources:
  pubmed:
    enabled: true
    retmax: 400

filters:
  keywords:
    # Metabolism
    - "metabolism"
    - "metabolic"
    - "obesity"
    - "insulin resistance"
    - "type 2 diabetes"
    - "GLP-1"
    - "semaglutide"
    - "tirzepatide"
    - "NAFLD"
    - "NASH"
    - "MASH"
    - "fatty liver"
    # AI for healthcare
    - "artificial intelligence"
    - "machine learning"
    - "deep learning"
    - "foundation model"
    - "large language model"
    - "clinical decision support"
    - "medical imaging AI"
    - "risk prediction model"
    - "electronic health record"

  journal_groups:
    - name: "综合顶刊"
      journals:
        - "Nature"
        - "Science"
        - "Cell"
        - name: "NEJM"
          aliases:
            - "The New England Journal of Medicine"
            - "New England Journal of Medicine"
            - "N Engl J Med"
        - name: "The Lancet"
          aliases:
            - "Lancet"
        - "JAMA"
        - "BMJ"
        - name: "PNAS"
          aliases:
            - "Proceedings of the National Academy of Sciences of the United States of America"
        - "Nature Medicine"
        - "Nature Biotechnology"
        - "Nature Metabolism"
        - "Nature Communications"
        - "Science Translational Medicine"
        - "Cell Metabolism"

    - name: "代谢/内分泌/肥胖与并发症方向重点期刊"
      journals:
        - "Diabetes"
        - "Diabetologia"
        - "Diabetes Care"
        - "Endocrine Reviews"
        - name: "The Journal of Clinical Endocrinology & Metabolism"
          aliases:
            - "The Journal of Clinical Endocrinology and Metabolism"
            - "Journal of Clinical Endocrinology and Metabolism"
            - "J Clin Endocrinol Metab"
        - "Gut"
        - "Hepatology"
        - "Gastroenterology"
        - "Circulation"
        - "Circulation Research"
        - "Kidney International"

    - name: "AI 医疗/数字医学重点期刊"
      journals:
        - "Nature Machine Intelligence"
        - "npj Digital Medicine"
        - "Radiology"
        - "Medical Image Analysis"
        - name: "JAMIA"
          aliases:
            - "Journal of the American Medical Informatics Association"
            - "J Am Med Inform Assoc"

output:
  dir: "output"
  filename_prefix: "digest"

state:
  enable_dedup: false
  seen_index_path: "state/seen_ids.json"
  retention_days: 365
