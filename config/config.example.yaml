sources:
  pubmed:
    enabled: true
    retmax: 200

filters:
  keywords:
    - "large language model"
    - "medical imaging"
    - "genomics"
  journal_groups:
    - name: "综合顶刊"
      journals:
        - "Nature"
        - "Science"
        - "Cell"
        - name: "NEJM"
          aliases:
            - "The New England Journal of Medicine"
            - "N Engl J Med"
    - name: "AI 医疗/数字医学重点期刊"
      journals:
        - "npj Digital Medicine"
        - "Radiology"
        - name: "JAMIA"
          aliases:
            - "Journal of the American Medical Informatics Association"
            - "J Am Med Inform Assoc"

output:
  dir: "output"
  filename_prefix: "digest"

state:
  enable_dedup: false
  seen_index_path: "state/seen_ids.json"
  retention_days: 365
