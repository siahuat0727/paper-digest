sources:
  arxiv:
    enabled: true
    max_results: 120
  pubmed:
    enabled: true
    retmax: 200

filters:
  keywords:
    - "large language model"
    - "medical imaging"
    - "genomics"
  include_journals: []
  exclude_keywords:
    - "protocol"
    - "retracted"

output:
  dir: "output"
  filename_prefix: "digest"

state:
  seen_index_path: "state/seen_ids.json"
  retention_days: 365
